name: CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore KasaManager.sln

      - name: Build
        run: dotnet build KasaManager.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/KasaManager.Tests/KasaManager.Tests.csproj --no-restore --verbosity normal
        # NOT: DB-bağımlı testler varsa InMemory/SQLite provider gerekebilir.
        # Şu anda 155 test DB bağlantısı gerektirmiyor.
